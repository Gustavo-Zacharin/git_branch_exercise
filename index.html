<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">

<title>Painel do Reino</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    font-family:'Uncial Antiqua', cursive;

    background: radial-gradient(circle at center, #3b2f1e, #1a1208);
    color:#f5e6c8;

    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:radial-gradient(#ffd700 1px, transparent 1px);
    background-size:40px 40px;

    opacity:0.2;

    animation:stars 40s linear infinite;
}

@keyframes stars{
    from{transform:translateY(0);}
    to{transform:translateY(-200px);}
}

.dashboard-container{

    background:linear-gradient(145deg,#5a4327,#2e2011);

    padding:40px;

    border:4px solid #caa45f;

    border-radius:20px;

    box-shadow:
        0 0 30px rgba(0,0,0,0.8),
        inset 0 0 20px rgba(255,215,0,0.2);

    text-align:center;

    width:500px;

    animation:appear 1.5s ease;
}

@keyframes appear{

    from{
        transform:scale(0.7);
        opacity:0;
    }

    to{
        transform:scale(1);
        opacity:1;
    }

}

h1{

    color:#ffd700;

    margin-bottom:30px;

    text-shadow:0 0 10px rgba(255,215,0,0.7);
}

.metrics-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card{

    background:linear-gradient(145deg,#7a5a34,#3d2a15);

    border:2px solid #caa45f;

    padding:20px;

    border-radius:15px;

    transition:0.4s;

    box-shadow:0 0 10px rgba(0,0,0,0.6);
}

.card:hover{

    transform:scale(1.1);

    box-shadow:
        0 0 15px gold,
        0 0 30px rgba(255,215,0,0.4);
}

.card-value{

    font-size:28px;

    color:#ffd700;

    display:block;

    margin-bottom:5px;
}

.card-label{

    font-size:14px;

    color:#f5e6c8;
}

.status{

    margin-top:30px;

    font-size:13px;

    color:#d6c4a1;

    animation:pulse 2s infinite;
}

@keyframes pulse{

    0%{opacity:0.6}
    50%{opacity:1}
    100%{opacity:0.6}

}

.online{

    color:#00ff7b;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="dashboard-container">

<h1>Painel do Reino</h1>

<div class="metrics-grid">

<div class="card">
<span class="card-value">94.2%</span>
<span class="card-label">Precisão dos Oráculos</span>
</div>

<div class="card">
<span class="card-value">1.2s</span>
<span class="card-label">Tempo do Mensageiro</span>
</div>

</div>

<p class="status">
Status do Castelo: <span class="online">● Guardas Ativos</span>
</p>

</div>

</body>
</html>
