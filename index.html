<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel do Reino</title>

<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:'Uncial Antiqua', cursive;

    background: url("cavaleiro.gif") center center / cover no-repeat fixed;

    overflow:hidden;
}

body::before{

    content:"";
    position:absolute;

    width:100%;
    height:100%;

    background: rgba(0,0,0,0.65);

    backdrop-filter: blur(3px);

    z-index:0;
}

body::after{

    content:"";

    position:absolute;

    width:100%;
    height:100%;

    background-image: radial-gradient(gold 1px, transparent 1px);

    background-size: 40px 40px;

    opacity:0.2;

    animation: estrelas 40s linear infinite;

    z-index:0;
}

@keyframes estrelas{

    from{
        transform: translateY(0);
    }

    to{
        transform: translateY(-200px);
    }

}

.dashboard-container{

    position:relative;
    z-index:1;

    background: rgba(40,25,10,0.92);

    padding:40px;

    border-radius:20px;

    border:3px solid #c9a44c;

    box-shadow:
        0 0 30px rgba(0,0,0,0.8),
        inset 0 0 20px rgba(255,215,0,0.2);

    text-align:center;

    max-width:500px;
    width:90%;

    animation: aparecer 1.5s ease;
}

@keyframes aparecer{

    from{
        transform: scale(0.7);
        opacity:0;
    }

    to{
        transform: scale(1);
        opacity:1;
    }

}

h1{

    color: gold;

    margin-bottom:30px;

    text-shadow:
        0 0 10px gold,
        0 0 20px orange;

}

.metrics-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:20px;
}

.card{

    background: linear-gradient(145deg,#7a5a34,#3d2a15);

    border:2px solid #caa45f;

    padding:20px;

    border-radius:15px;

    transition:0.4s;

    box-shadow:0 0 10px rgba(0,0,0,0.6);

}

.card:hover{

    transform:scale(1.1);

    box-shadow:
        0 0 15px gold,
        0 0 30px rgba(255,215,0,0.4);

}

.card-value{

    font-size:28px;

    color:#ffd700;

    display:block;

    margin-bottom:5px;

}

.card-label{

    font-size:14px;

    color:#f5e6c8;

}

.status{

    margin-top:30px;

    font-size:13px;

    color:#d6c4a1;

    animation:pulsar 2s infinite;

}

@keyframes pulsar{

    0%{opacity:0.6}
    50%{opacity:1}
    100%{opacity:0.6}

}

.online{

    color:#00ff7b;

    font-weight:bold;

}

</style>

</head>

<body>

<div class="dashboard-container">

<h1>Painel do Reino</h1>

<div class="metrics-grid">

<div class="card">
<span class="card-value">94.2%</span>
<span class="card-label">Precisão dos Oráculos</span>
</div>

<div class="card">
<span class="card-value">1.2s</span>
<span class="card-label">Tempo do Mensageiro</span>
</div>

</div>

<p class="status">
Status do Castelo: <span class="online">● Guardas Ativos</span>
</p>

</div>

</body>
</html>
