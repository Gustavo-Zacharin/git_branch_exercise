<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dashboard - Ciência de Dados</title>
    <style>
        /* CSS BASE - ESTE É O BLOCO QUE ELES VÃO ALTERAR NA BRANCH */
        body {
            gap: 75px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000; /* Cor para alterar no modo noturno */
            color: #ffffff;               /* Cor para alterar no modo noturno */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard-container {
            background-color: #e69ee8aa; /* Cor para alterar no modo noturno */
            border: solid #8212fa 5px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #ffffff;
            overflow: hidden;
            white-space: nowrap;
            animation: type 2s steps(20, end) forwards, blink 0.7s infinite;
            margin-bottom: 20px;
        }

        @keyframes type {
            from{
                width: 0;
            }
            to{
                width: 100%;
            }
        }

        @keyframes blink{
            50%{
                border-color: transparent;
            }
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            border: solid #8212fa 2px;
            padding: 15px;
            border-radius: 8px;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .card-label {
            font-size: 14px;
            color: #ffffff;
        }

    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>Dashboard Analítico</h1>
        
        <div class="metrics-grid">
            <div class="card">
                <span class="card-value">94.2%</span>
                <span class="card-label">Acurácia</span>
            </div>
            <div class="card">
                <span class="card-value">1.2s</span>
                <span class="card-label">Latência</span>
            </div>
        </div>

        <p style="margin-top: 25px; font-size: 12px; color: #ffffff;">
            Status do Servidor: <span style="color: #8212fa;">● Online</span>
        </p>
    </div>

    <img src="barney.png" alt="barney">
</body>
</html>
